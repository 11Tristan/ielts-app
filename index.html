<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IELTS 智能字卡生成器</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      // --- Core State ---
      const [decks, setDecks] = useState([{ id: 'default', name: '預設牌組', createdAt: Date.now() }]);
      const [activeDeckId, setActiveDeckId] = useState('default');
      const [newDeckName, setNewDeckName] = useState('');
      const [cards, setCards] = useState([]);
      const [view, setView] = useState('home');

      // --- SRS & Review State ---
      const [reviewQueue, setReviewQueue] = useState([]);
      const [currentQueueIndex, setCurrentQueueIndex] = useState(0);
      const [isFlipped, setIsFlipped] = useState(false);
      
      // --- AI Features State ---
      const [error, setError] = useState('');
      const [quizData, setQuizData] = useState(null);
      const [showQuizAnswers, setShowQuizAnswers] = useState(false);
      const [inputText, setInputText] = useState('');

      const [availableVoices, setAvailableVoices] = useState([]);
      const fileInputRef = useRef(null);
      const importInputRef = useRef(null);
      
      // 🛡️ API Key 安全狀態管理
      const [apiKey, setApiKey] = useState(localStorage.getItem('ielts_api_key') || '');
      const [showSettings, setShowSettings] = useState(false);
      const [tempKey, setTempKey] = useState('');

      // --- Initialization ---
      useEffect(() => {
        const loadVoices = () => setAvailableVoices(window.speechSynthesis.getVoices());
        if ('speechSynthesis' in window) {
          loadVoices();
          window.speechSynthesis.onvoiceschanged = loadVoices;
        }
      }, []);

      useEffect(() => {
        const savedDecks = localStorage.getItem('ielts_decks');
        if (savedDecks) {
          try { setDecks(JSON.parse(savedDecks)); } catch (e) {}
        }
        
        const savedCards = localStorage.getItem('ielts_flashcards');
        if (savedCards) {
          try {
            const parsed = JSON.parse(savedCards);
            const migrated = parsed.map(c => c.deckId ? c : { ...c, deckId: 'default' });
            setCards(migrated);
          } catch (e) {}
        }
      }, []);

      // --- Auto Save ---
      useEffect(() => { localStorage.setItem('ielts_decks', JSON.stringify(decks)); }, [decks]);
      useEffect(() => { localStorage.setItem('ielts_flashcards', JSON.stringify(cards)); }, [cards]);

      // --- API Key 儲存功能 ---
      const handleSaveKey = () => {
        if (!tempKey.trim()) {
          alert("請輸入有效的 API Key");
          return;
        }
        localStorage.setItem('ielts_api_key', tempKey.trim());
        setApiKey(tempKey.trim());
        setShowSettings(false);
        alert("設定成功！你的 API Key 已安全地儲存在這台設備中。");
      };

      const handleExportData = () => {
        const dataToExport = { decks, cards };
        const dataStr = JSON.stringify(dataToExport, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `Flashcards_Backup_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      };

      const handleImportData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const importedData = JSON.parse(event.target.result);
            if (importedData.decks && importedData.cards) {
              if (window.confirm("匯入資料將會與現有資料合併，確定要繼續嗎？")) {
                setDecks(prev => {
                  const newDecks = importedData.decks.filter(d => !prev.some(pd => pd.id === d.id));
                  return [...prev, ...newDecks];
                });
                setCards(prev => {
                  const newCards = importedData.cards.filter(c => !prev.some(pc => pc.id === c.id));
                  return [...prev, ...newCards];
                });
                alert("資料匯入成功！");
              }
            } else {
              alert("檔案格式不正確，請確保是之前匯出的備份檔。");
            }
          } catch (err) {
            alert("讀取檔案失敗：" + err.message);
          }
        };
        reader.readAsText(file);
        if(importInputRef.current) importInputRef.current.value = "";
      };

      const getActiveDeckCards = () => cards.filter(c => c.deckId === activeDeckId);
      const getDeckCards = (deckId) => cards.filter(c => c.deckId === deckId);
      const getDueCardsCount = (deckId) => {
        const now = Date.now();
        return cards.filter(c => c.deckId === deckId && (!c.dueDate || c.dueDate <= now)).length;
      };

      const handleCreateDeck = (e) => {
        e.preventDefault();
        if (!newDeckName.trim()) return;
        const newDeck = { id: crypto.randomUUID(), name: newDeckName.trim(), createdAt: Date.now() };
        setDecks([...decks, newDeck]);
        setNewDeckName('');
      };

      const handleDeleteDeck = (e, deckId) => {
        e.stopPropagation();
        if (window.confirm("確定要刪除這個牌組與裡面所有的單字卡嗎？這個動作無法復原。")) {
          setDecks(decks.filter(d => d.id !== deckId));
          setCards(cards.filter(c => c.deckId !== deckId));
          if (activeDeckId === deckId) {
            setView('home');
            setActiveDeckId('default');
          }
        }
      };

      const handleDeleteCard = (cardId) => {
        if (window.confirm("確定要刪除這個單字嗎？")) {
          setCards(cards.filter(c => c.id !== cardId));
        }
      };

      const startReviewSession = () => {
        const now = Date.now();
        const activeCards = getActiveDeckCards();
        const due = activeCards.filter(c => !c.dueDate || c.dueDate <= now);
        
        if (due.length === 0 && activeCards.length > 0) {
          setView('all_caught_up');
          return;
        }
        
        setReviewQueue(due);
        setCurrentQueueIndex(0);
        setIsFlipped(false);
        setView('review');
      };

      const playAudio = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'en-GB';
          utterance.rate = 0.9;
          const englishVoice = availableVoices.find(v => v.lang === 'en-GB' && v.name.includes('Google')) ||
                               availableVoices.find(v => v.lang === 'en-GB') ||
                               availableVoices.find(v => v.lang.startsWith('en'));
          if (englishVoice) utterance.voice = englishVoice;
          window.speechSynthesis.speak(utterance);
        } else {
          alert("您的瀏覽器不支援語音播放。");
        }
      };

      // --- 🚀 完美升級版：正式切換至 Gemini 2.5 世代 ---
      const callGeminiAPI = async (payload) => {
        if (!apiKey) {
          alert("請先點選右上角的「設定」圖示，填入你的 Gemini API Key！");
          throw new Error("請先輸入 API Key");
        }

        try {
          // 這裡的網址已經更新為 Google 目前最新且正式的 gemini-2.5-flash 模型！
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          
          if (!response.ok) {
            const errorData = await response.json();
            console.error("API 錯誤詳情：", errorData);
            const errorMsg = errorData.error?.message || `伺服器回應 ${response.status}`;
            throw new Error(`API 拒絕連線：${errorMsg}`);
          }
          
          const data = await response.json();
          if (!data.candidates || data.candidates.length === 0) {
              throw new Error("AI 沒有回傳任何內容，請再試一次。");
          }
          
          let text = data.candidates[0].content.parts[0].text;
          text = text.replace(/```json/gi, '').replace(/```/g, '').trim();
          return JSON.parse(text);
          
        } catch (err) {
          console.error("執行錯誤：", err);
          throw new Error(err.message || "連線失敗，請檢查網路或 API Key 是否正確。");
        }
      };

      // --- Text Extraction ---
      const handleAnalyzeText = async (mode = 'advanced') => {
        if (!inputText.trim()) { setError('請先貼上文章！'); return; }
        setError(''); setView('loading');
        
        let modeInstruction = mode === 'advanced' 
          ? "請從文本中萃取【所有】屬於 B2 到 C2 級別的高級單字、搭配詞或實用語塊。不限制數量。"
          : "請從文本中萃取【所有】關鍵單字、生字或片語。不用分析是不是高級單字，只要是語言學習上可能有幫助的詞彙（包含基礎到進階），通通提取出來。不限制數量。";
        
        const systemPrompt = `你是一位語言學專家。\n${modeInstruction}\n⚠️ 極度重要指令：所有的中文解釋 (definition) 必須使用標準的「繁體中文 (Traditional Chinese, zh-TW)」，嚴禁簡體字或錯別字。\n請回傳純 JSON 陣列 (Array)，格式範例如下：[{"word":"單字","context":"語境","definition":"繁中解釋","example":"例句"}]`;
        
        const payload = {
          contents: [{ role: "user", parts: [{ text: inputText }] }],
          systemInstruction: { parts: [{ text: systemPrompt }] },
          generationConfig: { responseMimeType: "application/json" }
        };

        try {
          const extractedCards = await callGeminiAPI(payload);
          handleExtractedCards(extractedCards);
        } catch (err) {
          setError('分析過程中發生錯誤：' + err.message);
          setView('input');
        }
      };

      // --- Image Extraction ---
      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setError(''); setView('loading');
        const reader = new FileReader();
        reader.onloadend = async () => {
          const base64String = reader.result.split(',')[1];
          const mimeType = file.type;
          
          const systemPrompt = `你是一位語言學專家。請閱讀這張圖片中的所有文字，並從中萃取【所有】值得學習的英文單字、片語或表達方式。\n⚠️ 所有的中文解釋必須使用標準的「繁體中文」，嚴禁簡體字。\n請回傳純 JSON 陣列 (Array)，格式範例如下：[{"word":"單字","context":"語境","definition":"繁中解釋","example":"例句"}]`;
          
          const payload = {
            contents: [{ role: "user", parts: [{ text: "請分析圖片並提取單字卡" }, { inlineData: { mimeType: mimeType, data: base64String } }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] },
            generationConfig: { responseMimeType: "application/json" }
          };

          try {
            const extractedCards = await callGeminiAPI(payload);
            handleExtractedCards(extractedCards);
            if(fileInputRef.current) fileInputRef.current.value = "";
          } catch (err) {
            setError('圖片分析失敗：' + err.message);
            setView('input');
          }
        };
        reader.readAsDataURL(file);
      };

      const handleExtractedCards = (extractedCards) => {
        if (extractedCards && Array.isArray(extractedCards) && extractedCards.length > 0) {
          const now = Date.now();
          const newCards = extractedCards.map(card => ({
            ...card,
            id: crypto.randomUUID(),
            deckId: activeDeckId,
            interval: 0, 
            easeFactor: 2.5,
            dueDate: now 
          }));
          setCards(prev => {
            const updated = [...prev, ...newCards];
            setReviewQueue(newCards);
            setCurrentQueueIndex(0);
            setIsFlipped(false);
            setView('review');
            return updated;
          });
          setInputText(''); 
        } else {
          setError('在文本或圖片中沒有找到可提取的字彙，或是 AI 回傳格式不符。');
          setView('input');
        }
      };

      const handleNextCard = (rating) => {
        setIsFlipped(false);
        const currentCard = reviewQueue[currentQueueIndex];
        let { interval, easeFactor, id } = currentCard;
        let newInterval, newEase, newDueDate;
        const now = Date.now();

        if (rating === 'hard') {
          newInterval = 0; newEase = Math.max(1.3, easeFactor - 0.2); newDueDate = now + 60 * 1000; 
        } else if (rating === 'good') {
          newInterval = interval === 0 ? 1 : Math.round(interval * easeFactor); newEase = easeFactor; newDueDate = now + newInterval * 24 * 60 * 60 * 1000;
        } else if (rating === 'easy') {
          newInterval = interval === 0 ? 4 : Math.round(interval * easeFactor * 1.3); newEase = easeFactor + 0.15; newDueDate = now + newInterval * 24 * 60 * 60 * 1000;
        }

        setCards(prevCards => prevCards.map(c => c.id === id ? { ...c, interval: newInterval, easeFactor: newEase, dueDate: newDueDate } : c));
        
        if (currentQueueIndex < reviewQueue.length - 1) {
          setCurrentQueueIndex(prev => prev + 1);
        } else {
          setView('empty'); 
        }
      };

      const handleGenerateQuiz = async () => {
        const activeCards = getActiveDeckCards();
        if (activeCards.length === 0) return;
        setView('quiz_loading');
        setShowQuizAnswers(false);
        
        const shuffled = [...activeCards].sort(() => 0.5 - Math.random());
        const wordsToTest = shuffled.slice(0, 5).map(c => c.word).join(', ');

        const systemPrompt = `你是一位出題專家。請使用以下單字列表，撰寫一段有邏輯的學術短文（約50-80字），並挖空標記 "___(1)___"。\n⚠️ translation 欄位必須使用標準的「繁體中文」，嚴禁簡體字。\n請回傳純 JSON 物件，格式範例如下：{"passage":"短文","answers":["答案1","答案2"],"translation":"繁中翻譯"} \n單字列表: ${wordsToTest}`;
        
        const payload = {
          contents: [{ role: "user", parts: [{ text: `出克漏字測驗: ${wordsToTest}` }] }],
          systemInstruction: { parts: [{ text: systemPrompt }] },
          generationConfig: { responseMimeType: "application/json" }
        };

        try {
          const result = await callGeminiAPI(payload);
          setQuizData(result);
          setView('quiz');
        } catch (err) {
          setError('出題失敗：' + err.message);
          setView('empty');
        }
      };

      const activeDeckName = decks.find(d => d.id === activeDeckId)?.name || '未命名牌組';

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans p-4 md:p-8 flex flex-col items-center relative">
          
          {/* --- Settings Modal --- */}
          {showSettings && (
            <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 p-4 backdrop-blur-sm animate-in fade-in">
              <div className="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl scale-100 transition-all">
                <h3 className="text-xl font-bold mb-3 flex items-center gap-2 text-slate-800">
                  <i className="fa-solid fa-key text-amber-500"></i> 設定 Gemini API Key
                </h3>
                <p className="text-sm text-slate-500 mb-6 leading-relaxed">
                  請貼上你的 API Key。這把金鑰只會安全地儲存在你當前瀏覽器的 localStorage 中，不會上傳到網路，確保你的額度安全。
                </p>
                <input 
                  type="password" 
                  value={tempKey} 
                  onChange={e => setTempKey(e.target.value)} 
                  placeholder="AIzaSy..." 
                  className="w-full border border-slate-300 p-4 rounded-xl mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 font-mono text-sm" 
                />
                <div className="flex justify-end gap-3">
                  <button onClick={() => setShowSettings(false)} className="px-5 py-3 text-slate-600 font-bold hover:bg-slate-100 rounded-xl transition-colors">取消</button>
                  <button onClick={handleSaveKey} className="px-5 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-colors shadow-md">儲存設定</button>
                </div>
              </div>
            </div>
          )}

          {/* --- Global Header --- */}
          <header className="w-full max-w-3xl flex flex-col md:flex-row items-center justify-between mb-8 pb-4 border-b border-slate-200 gap-4">
            <div className="flex items-center gap-3 cursor-pointer hover:opacity-80 transition-opacity" onClick={() => { setView('home'); }}>
              <div className="bg-blue-600 p-2 rounded-lg text-white shadow-sm">
                <i className="fa-solid fa-brain text-xl"></i>
              </div>
              <div>
                <h1 className="text-xl font-bold text-slate-900 leading-tight">IELTS 智能字卡生成器</h1>
                <p className="text-sm text-slate-500 font-medium">SRS 間隔重複記憶系統</p>
              </div>
            </div>
            
            <div className="flex flex-wrap items-center justify-center gap-2">
              <button 
                onClick={() => { setTempKey(apiKey); setShowSettings(true); }} 
                className={`flex items-center gap-1 text-xs font-bold transition-colors bg-white border shadow-sm px-3 py-2 rounded-xl ${!apiKey ? 'border-red-300 text-red-600 animate-pulse' : 'border-slate-200 text-slate-600 hover:text-amber-500'}`}
                title="設定 API Key"
              >
                <i className="fa-solid fa-gear"></i> {apiKey ? '設定' : '請輸入金鑰'}
              </button>

              <input type="file" accept=".json" ref={importInputRef} onChange={handleImportData} className="hidden" />
              <button onClick={() => importInputRef.current?.click()} className="flex items-center gap-1 text-xs font-bold text-slate-600 hover:text-blue-600 transition-colors bg-white border border-slate-200 shadow-sm px-3 py-2 rounded-xl" title="匯入備份資料">
                <i className="fa-solid fa-file-import"></i> 匯入
              </button>
              <button onClick={handleExportData} className="flex items-center gap-1 text-xs font-bold text-slate-600 hover:text-green-600 transition-colors bg-white border border-slate-200 shadow-sm px-3 py-2 rounded-xl" title="下載備份檔">
                <i className="fa-solid fa-file-export"></i> 匯出
              </button>
              
              {view !== 'home' && (
                <button onClick={() => setView('home')} className="flex items-center gap-2 text-sm font-bold text-slate-600 hover:text-slate-900 transition-colors bg-white border border-slate-200 shadow-sm px-4 py-2 rounded-xl ml-2">
                  <i className="fa-solid fa-house"></i> 首頁
                </button>
              )}
            </div>
          </header>

          <main className="w-full max-w-3xl flex-1 flex flex-col">
            {/* --- View: Home (Decks List) --- */}
            {view === 'home' && (
              <div className="flex flex-col gap-6 animate-in fade-in duration-300">
                <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2 px-2">
                  <i className="fa-solid fa-folder-open text-blue-500"></i> 我的牌組 (Decks)
                </h2>
                <div className="grid gap-3">
                  {decks.map(deck => {
                    const total = getDeckCards(deck.id).length;
                    const due = getDueCardsCount(deck.id);
                    return (
                      <div key={deck.id} onClick={() => { setActiveDeckId(deck.id); setView('deck_dashboard'); }} className="group bg-white rounded-2xl p-5 border border-slate-200 shadow-sm hover:shadow-md hover:border-blue-300 transition-all cursor-pointer flex items-center justify-between">
                        <div className="flex items-center gap-4">
                          <div className="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition-colors">
                            <i className="fa-solid fa-folder text-xl"></i>
                          </div>
                          <div>
                            <h3 className="font-bold text-lg text-slate-900">{deck.name}</h3>
                            <p className="text-sm text-slate-500 font-medium mt-0.5">共 {total} 個單字</p>
                          </div>
                        </div>
                        <div className="flex items-center gap-4">
                          {due > 0 ? (
                            <span className="bg-red-50 text-red-600 font-bold px-3 py-1 rounded-full text-sm flex items-center gap-2 border border-red-100">
                              <span className="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>{due} 待複習
                            </span>
                          ) : total > 0 ? (
                            <span className="bg-green-50 text-green-600 font-bold px-3 py-1 rounded-full text-sm border border-green-100">已完成</span>
                          ) : null}
                          <button onClick={(e) => handleDeleteDeck(e, deck.id)} className="p-2 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors" title="刪除牌組">
                            <i className="fa-solid fa-trash"></i>
                          </button>
                          <i className="fa-solid fa-chevron-right text-slate-300 group-hover:text-blue-500 transition-colors"></i>
                        </div>
                      </div>
                    );
                  })}
                </div>
                <form onSubmit={handleCreateDeck} className="mt-4 bg-white rounded-2xl p-2 border border-slate-200 shadow-sm flex items-center focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 transition-all">
                  <div className="pl-4 text-slate-400"><i className="fa-solid fa-folder-plus text-lg"></i></div>
                  <input type="text" value={newDeckName} onChange={(e) => setNewDeckName(e.target.value)} placeholder="建立新牌組資料夾 (例如: 雅思寫作核心字)..." className="flex-1 bg-transparent border-none focus:outline-none p-4 text-slate-800 font-medium placeholder-slate-400" />
                  <button type="submit" disabled={!newDeckName.trim()} className="bg-slate-900 hover:bg-slate-800 disabled:bg-slate-300 text-white font-bold py-3 px-6 rounded-xl transition-colors mr-1">新增</button>
                </form>
              </div>
            )}

            {/* --- View: Deck Dashboard --- */}
            {view === 'deck_dashboard' && (
              <div className="flex flex-col gap-6 animate-in slide-in-from-right-4 duration-300">
                <div className="bg-white rounded-3xl p-8 border border-slate-200 shadow-sm relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
                  <button onClick={() => setView('home')} className="flex items-center gap-1 text-sm font-bold text-slate-400 hover:text-slate-700 mb-4 transition-colors"><i className="fa-solid fa-arrow-left"></i> 返回</button>
                  <h2 className="text-3xl font-extrabold text-slate-900 mb-2">{activeDeckName}</h2>
                  <div className="flex items-center gap-4 text-sm font-medium text-slate-500">
                    <span>總字卡：{getActiveDeckCards().length}</span>
                    <span className="w-1 h-1 rounded-full bg-slate-300"></span>
                    <span className={getDueCardsCount(activeDeckId) > 0 ? 'text-red-500 font-bold' : 'text-green-600'}>待複習：{getDueCardsCount(activeDeckId)}</span>
                  </div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <button onClick={startReviewSession} disabled={getDueCardsCount(activeDeckId) === 0 && getActiveDeckCards().length === 0} className="flex flex-col items-center justify-center p-8 bg-white hover:bg-blue-50 rounded-3xl border border-slate-200 hover:border-blue-300 shadow-sm transition-all group disabled:opacity-50 disabled:hover:bg-white disabled:hover:border-slate-200 disabled:cursor-not-allowed">
                    <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"><i className="fa-solid fa-calendar-check text-2xl"></i></div>
                    <span className="font-bold text-lg text-slate-900 mb-1">開始複習</span>
                    <span className="text-sm font-medium text-slate-500">{getDueCardsCount(activeDeckId) > 0 ? `有 ${getDueCardsCount(activeDeckId)} 個待複習` : (getActiveDeckCards().length > 0 ? '無待複習任務' : '牌組是空的')}</span>
                  </button>
                  <button onClick={() => setView('input')} className="flex flex-col items-center justify-center p-8 bg-white hover:bg-indigo-50 rounded-3xl border border-slate-200 hover:border-indigo-300 shadow-sm transition-all group">
                    <div className="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"><i className="fa-solid fa-brain text-2xl"></i></div>
                    <span className="font-bold text-lg text-slate-900 mb-1">新增字卡</span>
                    <span className="text-sm font-medium text-slate-500">AI 文章/圖片萃取</span>
                  </button>
                  <button onClick={() => setView('browse')} className="flex flex-col items-center justify-center p-8 bg-white hover:bg-amber-50 rounded-3xl border border-slate-200 hover:border-amber-300 shadow-sm transition-all group">
                    <div className="w-16 h-16 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mb-4 group-hover:scale-110 transition-transform"><i className="fa-solid fa-list text-2xl"></i></div>
                    <span className="font-bold text-lg text-slate-900 mb-1">瀏覽列表</span>
                    <span className="text-sm font-medium text-slate-500">查看與管理單字</span>
                  </button>
                </div>
              </div>
            )}

            {/* --- View: Browse (List View) --- */}
            {view === 'browse' && (
              <div className="flex flex-col gap-4 animate-in slide-in-from-bottom-4 duration-300">
                <div className="flex items-center justify-between mb-2">
                  <button onClick={() => setView('deck_dashboard')} className="flex items-center gap-1 text-sm font-bold text-slate-500 hover:text-slate-800 transition-colors"><i className="fa-solid fa-arrow-left"></i> 返回 {activeDeckName}</button>
                  <span className="text-sm font-bold text-slate-400">共 {getActiveDeckCards().length} 個單字</span>
                </div>
                {getActiveDeckCards().length === 0 ? (
                  <div className="bg-white rounded-3xl p-12 text-center border border-slate-200">
                    <i className="fa-solid fa-folder-open text-slate-300 text-5xl mb-4 block"></i>
                    <p className="text-lg font-bold text-slate-600">這個牌組還是空的喔！</p>
                    <button onClick={() => setView('input')} className="mt-4 text-blue-600 font-bold hover:underline">去新增字卡</button>
                  </div>
                ) : (
                  <div className="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                    <div className="divide-y divide-slate-100">
                      {getActiveDeckCards().slice().reverse().map(card => (
                        <div key={card.id} className="p-4 sm:p-5 hover:bg-slate-50 transition-colors flex items-center justify-between group">
                          <div className="flex-1 pr-4">
                            <div className="flex items-baseline gap-3 mb-1">
                              <h3 className="text-lg font-extrabold text-slate-900">{card.word}</h3>
                              <button onClick={() => playAudio(card.word)} className="text-slate-400 hover:text-blue-600 transition-colors" title="聆聽發音"><i className="fa-solid fa-volume-high"></i></button>
                            </div>
                            <p className="text-sm font-medium text-blue-700 mb-1">{card.definition}</p>
                            <p className="text-xs text-slate-500 italic truncate w-full max-w-md sm:max-w-lg">"{card.context}"</p>
                          </div>
                          <button onClick={() => handleDeleteCard(card.id)} className="p-2.5 text-slate-300 hover:text-red-500 hover:bg-red-50 rounded-xl transition-all opacity-0 group-hover:opacity-100 focus:opacity-100"><i className="fa-solid fa-trash"></i></button>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* --- View: Input Area --- */}
            {view === 'input' && (
              <div className="flex flex-col gap-6 animate-in fade-in duration-300">
                <button onClick={() => setView('deck_dashboard')} className="flex items-center gap-1 text-sm font-bold text-slate-500 hover:text-slate-800 self-start transition-colors"><i className="fa-solid fa-arrow-left"></i> 返回 {activeDeckName}</button>
                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex flex-col gap-4">
                  <div className="flex items-center justify-between mb-2">
                    <label className="text-sm font-bold text-slate-700 flex items-center gap-2"><i className="fa-solid fa-pen-to-square text-indigo-500"></i> 新增至「{activeDeckName}」：</label>
                    <input type="file" accept="image/*" ref={fileInputRef} onChange={handleImageUpload} className="hidden" />
                    <button onClick={() => fileInputRef.current?.click()} className="text-xs flex items-center gap-1 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 py-2 px-3 rounded-lg font-bold transition-colors"><i className="fa-solid fa-image"></i> 圖片辨識</button>
                  </div>
                  <textarea value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder="貼上你的文章段落，讓 AI 考官幫你掃描裡面的生字！" className="w-full h-40 p-4 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all resize-none text-slate-700 leading-relaxed bg-slate-50" />
                  
                  {/* ✨ 錯誤訊息會清楚顯示在這裡 ✨ */}
                  {error && <p className="text-red-500 text-sm font-bold bg-red-50 p-4 border border-red-200 rounded-lg">{error}</p>}
                  
                  <div className="flex flex-col sm:flex-row gap-3 mt-2">
                    <button onClick={() => handleAnalyzeText('all')} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2 border border-slate-300 shadow-sm"><i className="fa-solid fa-list-check"></i> ⚡ 萃取所有生字 (全包)</button>
                    <button onClick={() => handleAnalyzeText('advanced')} className="flex-1 bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl transition-colors flex items-center justify-center gap-2 shadow-md"><i className="fa-solid fa-brain"></i> 🎯 僅萃取 C1/C2 高級詞彙</button>
                  </div>
                </div>
              </div>
            )}

            {/* --- View: Loading --- */}
            {view === 'loading' && (
              <div className="flex-1 flex flex-col items-center justify-center py-20 animate-in fade-in">
                <i className="fa-solid fa-rotate animate-spin text-blue-600 text-5xl mb-6"></i>
                <h2 className="text-xl font-bold text-slate-800 mb-2">AI 考官正在幫你抓單字...</h2>
                <p className="text-slate-500 font-medium">請稍候，馬上為您產生專屬字卡</p>
              </div>
            )}

            {/* --- View: All Caught Up --- */}
            {view === 'all_caught_up' && (
              <div className="flex-1 flex flex-col gap-6 animate-in zoom-in-95 justify-center items-center py-10">
                <div className="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mb-4 border-4 border-green-100">
                  <i className="fa-solid fa-circle-check text-green-500 text-5xl"></i>
                </div>
                <h2 className="text-3xl font-extrabold text-slate-800 mb-2">今日任務完成！</h2>
                <p className="text-slate-500 text-center max-w-sm mb-8 leading-relaxed font-medium">這個牌組該複習的單字都看過一遍了！這就是演算法的魔力。<br/>你可以休息一下，或是去新增生字。</p>
                <div className="flex gap-3">
                  <button onClick={() => setView('deck_dashboard')} className="py-3 px-6 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors">返回 {activeDeckName}</button>
                  <button onClick={() => setView('input')} className="py-3 px-6 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition-colors shadow-md"><i className="fa-solid fa-plus mr-1"></i> 學新單字</button>
                </div>
              </div>
            )}

            {/* --- View: Review (SRS Engine) --- */}
            {view === 'review' && reviewQueue.length > 0 && (
              <div className="flex flex-col items-center w-full animate-in slide-in-from-bottom-4 duration-500">
                <div className="w-full flex items-center justify-between mb-4 px-2">
                  <span className="text-xs font-bold text-slate-400">Card {currentQueueIndex + 1} of {reviewQueue.length}</span>
                  <div className="h-2 flex-1 mx-4 bg-slate-200 rounded-full overflow-hidden">
                    <div className="h-full bg-blue-600 transition-all duration-300" style={{ width: `${((currentQueueIndex + 1) / reviewQueue.length) * 100}%` }}></div>
                  </div>
                </div>
                <div className={`w-full min-h-[400px] bg-white rounded-3xl shadow-xl border border-slate-100 p-8 flex flex-col justify-center items-center cursor-pointer transition-all duration-500 transform ${isFlipped ? 'scale-[1.02] shadow-2xl border-blue-200' : 'hover:scale-[1.01]'}`} onClick={() => !isFlipped && setIsFlipped(true)}>
                  {!isFlipped ? (
                    <div className="text-center flex flex-col items-center gap-6 w-full animate-in fade-in">
                      <span className="px-3 py-1 bg-blue-50 text-blue-700 text-xs font-bold rounded-full uppercase tracking-wider flex items-center gap-1"><i className="fa-solid fa-brain"></i> Focus Word</span>
                      <div className="flex items-center gap-3">
                        <h2 className="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight">{reviewQueue[currentQueueIndex].word}</h2>
                        <button onClick={(e) => { e.stopPropagation(); playAudio(reviewQueue[currentQueueIndex].word); }} className="p-3 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-all" title="聆聽發音"><i className="fa-solid fa-volume-high text-xl"></i></button>
                      </div>
                      <div className="w-full p-5 bg-slate-50 rounded-2xl border border-slate-100 mt-2 text-left">
                        <p className="text-xs text-slate-400 mb-2 font-bold uppercase tracking-wider">來源語境 (Context)</p>
                        <p className="text-slate-700 italic text-lg leading-relaxed">"{reviewQueue[currentQueueIndex].context}"</p>
                      </div>
                      <p className="text-sm text-slate-400 mt-4 flex items-center gap-2 animate-pulse"><i className="fa-solid fa-rotate"></i> 點擊翻開看解析</p>
                    </div>
                  ) : (
                    <div className="text-left flex flex-col gap-6 w-full animate-in fade-in">
                      <div className="border-b border-slate-100 pb-5">
                        <div className="flex items-center justify-between mb-3">
                          <h2 className="text-3xl font-extrabold text-slate-900">{reviewQueue[currentQueueIndex].word}</h2>
                          <button onClick={(e) => { e.stopPropagation(); playAudio(reviewQueue[currentQueueIndex].word); }} className="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-all"><i className="fa-solid fa-volume-high text-xl"></i></button>
                        </div>
                        <p className="text-blue-700 font-bold text-xl">{reviewQueue[currentQueueIndex].definition}</p>
                      </div>
                      <div>
                        <p className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 flex items-center gap-1"><i className="fa-solid fa-award"></i> 雅思 Band 8+ 例句</p>
                        <p className="text-slate-800 leading-relaxed font-medium bg-blue-50 p-5 rounded-2xl border border-blue-100 text-lg">{reviewQueue[currentQueueIndex].example}</p>
                      </div>
                    </div>
                  )}
                </div>
                {isFlipped && (
                  <div className="flex gap-3 w-full mt-8 animate-in slide-in-from-bottom-2">
                    <button onClick={(e) => { e.stopPropagation(); handleNextCard('hard'); }} className="flex-1 py-4 bg-red-50 text-red-700 hover:bg-red-100 font-bold rounded-2xl transition-all border border-red-100 shadow-sm hover:shadow">
                      <span className="block text-lg">忘記了</span><span className="block text-xs opacity-70 mt-1">1分鐘後重考</span>
                    </button>
                    <button onClick={(e) => { e.stopPropagation(); handleNextCard('good'); }} className="flex-1 py-4 bg-green-50 text-green-700 hover:bg-green-100 font-bold rounded-2xl transition-all border border-green-100 shadow-sm hover:shadow">
                      <span className="block text-lg">記得了</span><span className="block text-xs opacity-70 mt-1">{reviewQueue[currentQueueIndex].interval === 0 ? '1天後' : `${Math.round(reviewQueue[currentQueueIndex].interval * reviewQueue[currentQueueIndex].easeFactor)}天後`}</span>
                    </button>
                    <button onClick={(e) => { e.stopPropagation(); handleNextCard('easy'); }} className="flex-1 py-4 bg-blue-50 text-blue-700 hover:bg-blue-100 font-bold rounded-2xl transition-all border border-blue-100 shadow-sm hover:shadow">
                      <span className="block text-lg">太簡單</span><span className="block text-xs opacity-70 mt-1">{reviewQueue[currentQueueIndex].interval === 0 ? '4天後' : `${Math.round(reviewQueue[currentQueueIndex].interval * reviewQueue[currentQueueIndex].easeFactor * 1.3)}天後`}</span>
                    </button>
                  </div>
                )}
              </div>
            )}

            {/* --- View: Finished Session --- */}
            {view === 'empty' && (
              <div className="flex-1 flex flex-col gap-6 animate-in zoom-in-95 py-10">
                <div className="bg-white rounded-3xl shadow-sm border border-slate-200 flex flex-col items-center justify-center p-10 text-center">
                  <div className="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-6"><i className="fa-solid fa-circle-check text-green-600 text-4xl"></i></div>
                  <h2 className="text-2xl font-bold text-slate-900 mb-2">本輪複習完成！</h2>
                  <p className="text-slate-500 mb-8 max-w-sm font-medium">記憶正在被科學地鞏固。點擊返回繼續學習，或是立刻進行一場克漏字魔鬼特訓來驗收成果！</p>
                  <button onClick={() => setView('deck_dashboard')} className="w-full max-w-sm py-4 px-4 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl transition-colors shadow-md">返回 {activeDeckName} 儀表板</button>
                </div>
                {getActiveDeckCards().length >= 3 && (
                  <div className="bg-gradient-to-r from-amber-50 to-orange-50 rounded-3xl shadow-sm border border-amber-100 p-8 text-center mt-4">
                    <h3 className="text-lg font-bold text-amber-900 mb-2 flex items-center justify-center gap-2"><i className="fa-solid fa-wand-magic-sparkles text-amber-500"></i> 魔鬼特訓：語境驗收</h3>
                    <button onClick={handleGenerateQuiz} className="w-full max-w-md mx-auto py-4 bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-xl transition-all shadow-md flex items-center justify-center gap-2 hover:shadow-lg mt-4">✨ 進行 AI 隨堂克漏字測驗</button>
                  </div>
                )}
              </div>
            )}

            {/* --- View: Quiz --- */}
            {view === 'quiz_loading' && (
              <div className="flex-1 flex flex-col items-center justify-center py-20 animate-in fade-in">
                <i className="fa-solid fa-file-lines animate-bounce text-amber-500 text-5xl mb-4"></i>
                <h2 className="text-xl font-bold text-slate-800 mb-2">考官正在為你量身出題...</h2>
              </div>
            )}

            {view === 'quiz' && quizData && (
              <div className="flex-1 flex flex-col gap-6 animate-in slide-in-from-bottom-4">
                <div className="bg-white rounded-3xl shadow-md border border-amber-200 p-6 md:p-8 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-full h-2 bg-amber-400"></div>
                  <h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2"><i className="fa-solid fa-file-lines text-amber-500"></i> 實戰語境填空測驗</h2>
                  <div className="bg-slate-50 p-6 rounded-2xl border border-slate-200 mb-6">
                    <p className="text-slate-800 leading-loose text-lg font-medium whitespace-pre-line">{quizData.passage}</p>
                  </div>
                  {!showQuizAnswers ? (
                    <button onClick={() => setShowQuizAnswers(true)} className="w-full py-4 bg-amber-100 hover:bg-amber-200 text-amber-800 font-bold rounded-xl transition-colors flex items-center justify-center gap-2 border border-amber-300"><i className="fa-solid fa-eye"></i> ✨ 看解答與翻譯</button>
                  ) : (
                    <div className="animate-in fade-in slide-in-from-top-2">
                      <div className="bg-amber-50 rounded-2xl p-6 border border-amber-200 mb-6">
                        <h3 className="font-bold text-amber-900 mb-4 text-sm uppercase tracking-wider">正確解答</h3>
                        <div className="flex flex-wrap gap-3">
                          {quizData.answers.map((ans, idx) => (
                            <div key={idx} className="bg-white px-4 py-2 rounded-lg border border-amber-200 shadow-sm flex items-center gap-2">
                              <span className="bg-amber-100 text-amber-800 text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full">{idx + 1}</span>
                              <span className="font-bold text-slate-800">{ans}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                      <div className="bg-slate-50 rounded-2xl p-6 border border-slate-200 mb-6 text-sm text-slate-600 leading-relaxed">
                        <span className="font-bold text-slate-800 block mb-2">中文翻譯：</span>{quizData.translation}
                      </div>
                      <button onClick={() => setView('deck_dashboard')} className="w-full py-4 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl transition-colors flex items-center justify-center gap-2 shadow-md">返回儀表板 <i className="fa-solid fa-arrow-right"></i></button>
                    </div>
                  )}
                </div>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
