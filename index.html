<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IELTS 智能字卡生成器</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      // --- Core State ---
      const [decks, setDecks] = useState([{ id: 'default', name: '預設牌組', createdAt: Date.now() }]);
      const [activeDeckId, setActiveDeckId] = useState('default');
      const [newDeckName, setNewDeckName] = useState('');
      const [cards, setCards] = useState([]);
      const [view, setView] = useState('home');

      // --- SRS & Review State ---
      const [reviewQueue, setReviewQueue] = useState([]);
      const [currentQueueIndex, setCurrentQueueIndex] = useState(0);
      const [isFlipped, setIsFlipped] = useState(false);
      
      // --- AI Features State ---
      const [error, setError] = useState('');
      const [quizData, setQuizData] = useState(null);
      const [showQuizAnswers, setShowQuizAnswers] = useState(false);
      const [inputText, setInputText] = useState('');

      const [availableVoices, setAvailableVoices] = useState([]);
      const fileInputRef = useRef(null);
      const importInputRef = useRef(null);
      
      // 🛡️ API Key 安全狀態管理
      const [apiKey, setApiKey] = useState(localStorage.getItem('ielts_api_key') || '');
      const [showSettings, setShowSettings] = useState(false);
      const [tempKey, setTempKey] = useState('');

      // --- Initialization ---
      useEffect(() => {
        const loadVoices = () => setAvailableVoices(window.speechSynthesis.getVoices());
        if ('speechSynthesis' in window) {
          loadVoices();
          window.speechSynthesis.onvoiceschanged = loadVoices;
        }
      }, []);

      useEffect(() => {
        const savedDecks = localStorage.getItem('ielts_decks');
        if (savedDecks) {
          try { setDecks(JSON.parse(savedDecks)); } catch (e) {}
        }
        
        const savedCards = localStorage.getItem('ielts_flashcards');
        if (savedCards) {
          try {
            const parsed = JSON.parse(savedCards);
            const migrated = parsed.map(c => c.deckId ? c : { ...c, deckId: 'default' });
            setCards(migrated);
          } catch (e) {}
        }
      }, []);

      // --- Auto Save ---
      useEffect(() => { localStorage.setItem('ielts_decks', JSON.stringify(decks)); }, [decks]);
      useEffect(() => { localStorage.setItem('ielts_flashcards', JSON.stringify(cards)); }, [cards]);

      // --- API Key 儲存功能 ---
      const handleSaveKey = () => {
        if (!tempKey.trim()) {
          alert("請輸入有效的 API Key");
          return;
        }
        localStorage.setItem('ielts_api_key', tempKey.trim());
        setApiKey(tempKey.trim());
        setShowSettings(false);
        alert("設定成功！你的 API Key 已安全地儲存在這台設備中。");
      };

      const handleExportData = () => {
        const dataToExport = { decks, cards };
        const dataStr = JSON.stringify(dataToExport, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `Flashcards_Backup_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      };

      const handleImportData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const importedData = JSON.parse(event.target.result);
            if (importedData.decks && importedData.cards) {
              if (window.confirm("匯入資料將會與現有資料合併，確定要繼續嗎？")) {
                setDecks(prev => {
                  const newDecks = importedData.decks.filter(d => !prev.some(pd => pd.id === d.id));
                  return [...prev, ...newDecks];
                });
                setCards(prev => {
                  const newCards = importedData.cards.filter(c => !prev.some(pc => pc.id === c.id));
                  return [...prev, ...newCards];
                });
                alert("資料匯入成功！");
              }
            } else {
              alert("檔案格式不正確，請確保是之前匯出的備份檔。");
            }
          } catch (err) {
            alert("讀取檔案失敗：" + err.message);
          }
        };
        reader.readAsText(file);
        if(importInputRef.current) importInputRef.current.value = "";
      };

      const getActiveDeckCards = () => cards.filter(c => c.deckId === activeDeckId);
      const getDeckCards = (deckId) => cards.filter(c => c.deckId === deckId);
      const getDueCardsCount = (deckId) => {
        const now = Date.now();
        return cards.filter(c => c.deckId === deckId && (!c.dueDate || c.dueDate <= now)).length;
      };

      const handleCreateDeck = (e) => {
        e.preventDefault();
        if (!newDeckName.trim()) return;
        const newDeck = { id: crypto.randomUUID(), name: newDeckName.trim(), createdAt: Date.now() };
        setDecks([...decks, newDeck]);
        setNewDeckName('');
      };

      const handleDeleteDeck = (e, deckId) => {
        e.stopPropagation();
        if (window.confirm("確定要刪除這個牌組與裡面所有的單字卡嗎？這個動作無法復原。")) {
          setDecks(decks.filter(d => d.id !== deckId));
          setCards(cards.filter(c => c.deckId !== deckId));
          if (activeDeckId === deckId) {
            setView('home');
            setActiveDeckId('default');
          }
        }
      };

      const handleDeleteCard = (cardId) => {
        if (window.confirm("確定要刪除這個單字嗎？")) {
          setCards(cards.filter(c => c.id !== cardId));
        }
      };

      const startReviewSession = () => {
        const now = Date.now();
        const activeCards = getActiveDeckCards();
        const due = activeCards.filter(c => !c.dueDate || c.dueDate <= now);
        
        if (due.length === 0 && activeCards.length > 0) {
          setView('all_caught_up');
          return;
        }
        
        setReviewQueue(due);
        setCurrentQueueIndex(0);
        setIsFlipped(false);
        setView('review');
      };

      const playAudio = (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'en-GB';
          utterance.rate = 0.9;
          const englishVoice = availableVoices.find(v => v.lang === 'en-GB' && v.name.includes('Google')) ||
                               availableVoices.find(v => v.lang === 'en-GB') ||
                               availableVoices.find(v => v.lang.startsWith('en'));
          if (englishVoice) utterance.voice = englishVoice;
          window.speechSynthesis.speak(utterance);
        } else {
          alert("您的瀏覽器不支援語音播放。");
        }
      };

      // --- 🚀 完美升級版：正式切換至 Gemini 2.5 世代 ---
      const callGeminiAPI = async (payload) => {
        if (!apiKey) {
          alert("請先點選右上角的「設定」圖示，填入你的 Gemini API Key！");
          throw new Error("請先輸入 API Key");
        }

        try {
          // 這裡的網址已經更新為 Google 目前最新且正式的 gemini-2.5-flash 模型！
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          
          if (!response.ok) {
            const errorData = await response.json();
            console.error("API 錯誤詳情：", errorData);
            const errorMsg = errorData.error?.message || `伺服器回應 ${response.status}`;
            throw new Error(`API 拒絕連線：${errorMsg}`);
          }
          
          const data = await response.json();
          if (!data.candidates || data.candidates.length === 0) {
              throw new Error("AI 沒有回傳任何內容，請再試一次。");
          }
          
          let text = data.candidates[0].content.parts[0].text;
          text = text.replace(/```json/gi, '').replace(/```/g, '').trim();
          return JSON.parse(text);
          
        } catch (err) {
          console.error("執行錯誤：", err);
          throw new Error(err.message || "連線失敗，請檢查網路或 API Key 是否正確。");
        }
      };

      // --- Text Extraction ---
      const handleAnalyzeText = async (mode = 'advanced') => {
        if (!inputText.trim()) { setError('請先貼上文章！'); return; }
        setError(''); setView('loading');
        
        let modeInstruction = mode === 'advanced' 
          ? "請從文本中萃取【所有】屬於 B2 到 C2 級別的高級單字、搭配詞或實用語塊。不限制數量。"
          : "請從文本中萃取【所有】關鍵單字、生字或片語。不用分析是不是高級單字，只要是語言學習上可能有幫助的詞彙（包含基礎到進階），通通提取出來。不限制數量。";
        
        const systemPrompt = `你是一位語言學專家。\n${modeInstruction}\n⚠️ 極度重要指令：所有的中文解釋 (definition) 必須使用標準的「繁體中文 (Traditional Chinese, zh-TW)」，嚴禁簡體字或錯別字。\n請回傳純 JSON 陣列 (Array)，格式範例如下：[{"word":"單字","context":"語境","definition":"繁中解釋","example":"例句"}]`;
        
        const payload = {
          contents: [{ role: "user", parts: [{ text: inputText }] }],
          systemInstruction: { parts: [{ text: systemPrompt }] },
          generationConfig: { responseMimeType: "application/json" }
        };

        try {
          const extractedCards = await callGeminiAPI(payload);
          handleExtractedCards(extractedCards);
        } catch (err) {
          setError('分析過程中發生錯誤：' + err.message);
          setView('input');
        }
      };

      // --- Image Extraction ---
      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setError(''); setView('loading');
        const reader = new FileReader();
        reader.onloadend = async () => {
          const base64String = reader.result.split(',')[1];
          const mimeType = file.type;
          
          const systemPrompt = `你是一位語言學專家。請閱讀這張圖片中的所有文字，並從中萃取【所有】值得學習的英文單字、片語或表達方式。\n⚠️ 所有的中文解釋必須使用標準的「繁體中文」，嚴禁簡體字。\n請回傳純 JSON 陣列 (Array)，格式範例如下：[{"word":"單字","context":"語境","definition":"繁中解釋","example":"例句"}]`;
          
          const payload = {
            contents: [{ role: "user", parts: [{ text: "請分析圖片並提取單字卡" }, { inlineData: { mimeType: mimeType, data: base64String } }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] },
            generationConfig: { responseMimeType: "application/json" }
          };

          try {
            const extractedCards = await callGeminiAPI(payload);
            handleExtractedCards(extractedCards);
            if(fileInputRef.current) fileInputRef.current.value = "";
          } catch (err) {
            setError('圖片分析失敗：' + err.message);
            setView('input');
          }
        };
        reader.readAsDataURL(file);
      };

      const handleExtractedCards = (extractedCards) => {
        if (extractedCards && Array.isArray(extractedCards) && extractedCards.length > 0) {
          const now = Date.now();
          const newCards = extractedCards.map(card => ({
            ...card,
            id: crypto.randomUUID(),
            deckId: activeDeckId,
            interval: 0, 
            easeFactor: 2.5,
            dueDate: now 
          }));
          setCards(prev => {
            const updated = [...prev, ...newCards];
            setReviewQueue(newCards);
            setCurrentQueueIndex(0);
            setIsFlipped(false);
            setView('review');
            return updated;
          });
          setInputText(''); 
        } else {
          setError('在文本或圖片中沒有找到可提取的字彙，或是 AI 回傳格式不符。');
          setView('input');
        }
      };

      const handleNextCard = (rating) => {
        setIsFlipped(false);
        const currentCard = reviewQueue[currentQueueIndex];
        let { interval, easeFactor, id } = currentCard;
        let newInterval, newEase, newDueDate;
        const now = Date.now();

        if (rating === 'hard') {
          newInterval = 0; newEase = Math.max(1.3, easeFactor - 0.2); newDueDate = now + 60 * 1000; 
        } else if (rating === 'good') {
          newInterval = interval === 0 ? 1 : Math.round(interval * easeFactor); newEase = easeFactor; newDueDate = now + newInterval * 24 * 60 * 60 * 1000;
        } else if (rating === 'easy') {
          newInterval = interval === 0 ? 4 : Math.round(interval * easeFactor * 1.3); newEase = easeFactor + 0.15; newDueDate = now + newInterval * 24 * 60 * 60 * 1000;
        }

        setCards(prevCards => prevCards.map(c => c.id === id ? { ...c, interval: newInterval, easeFactor: newEase, dueDate: newDueDate } : c));
        
        if (currentQueueIndex < reviewQueue.length - 1) {
          setCurrentQueueIndex(prev => prev + 1);
        } else {
          setView('empty'); 
        }
      };

      const handleGenerateQuiz = async () => {
        const activeCards = getActiveDeckCards();
        if (activeCards.length === 0) return;
        setView('quiz_loading');
        setShowQuizAnswers(false);
        
        const shuffled = [...activeCards].sort(() => 0.5 - Math.random());
        const wordsToTest = shuffled.slice(0, 5).map(c => c.word).join(', ');

        const systemPrompt = `你是一位出題專家。請使用以下單字列表，撰寫一段有邏輯的學術短文（約50-80字），並挖空標記 "___(1)___"。\n⚠️ translation 欄位必須使用標準的「繁體中文」，嚴禁簡體字。\n請回傳純 JSON 物件，格式範例如下：{"passage":"短文","answers":["答案1","答案2"],"translation":"繁中翻譯"} \n單字列表: ${wordsToTest}`;
        
        const payload = {
          contents: [{ role: "user", parts: [{ text: `出克漏字測驗: ${wordsToTest}` }] }],
          systemInstruction: { parts: [{ text: systemPrompt }] },
          generationConfig: { responseMimeType: "application/json" }
        };

        try {
          const result = await callGeminiAPI(payload);
          setQuizData(result);
          setView('quiz');
        } catch (err) {
          setError('出題失敗：' + err.message);
          setView('empty');
        }
      };

      const activeDeckName = decks.find(d => d.id === activeDeckId)?.name || '未命名牌組';

      return (
        <div className="min-h-screen bg-slate-50 text-slate-800 font-sans p-4 md:p-8 flex flex-col items-center relative">
          
          {/* --- Settings Modal --- */}
          {showSettings && (
            <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 p-4 backdrop-blur-sm animate-in fade-in">
              <div className="bg-white rounded-3xl p-8 w-full max-w-md shadow-2xl scale-100 transition-all">
                <h3 className="text-xl font-bold mb-3 flex items-center gap-2 text-slate-800">
                  <i className="fa-solid fa-key text-amber-500"></i> 設定 Gemini API Key
                </h3>
                <p className="text-sm text-slate-500 mb-6 leading-relaxed">
                  請貼上你的 API Key。這把金鑰只會安全地儲存在你當前瀏覽器的 localStorage 中，不會上傳到網路，確保你的額度安全。
                </p>
                <input 
                  type="password" 
                  value={tempKey} 
                  onChange={e => setTempKey(e.target.value)} 
                  placeholder="AIzaSy..." 
                  className="w-full border border-slate-300 p-4 rounded-xl mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-slate-50 font-mono text-sm" 
                />
                <div className="flex justify-end gap-3">
